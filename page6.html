<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>봉인 완료</title>
    <style>
        :root { --bg: #121212; --text: #EAEAEA; --green: #00A86B; --gold: #D4AF37; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 20px; box-sizing: border-box; }
        .container { border: 1px solid rgba(0, 168, 107, 0.4); border-radius: 8px; padding: 40px 20px; max-width: 400px; width: 100%; box-shadow: 0 0 25px rgba(0, 168, 107, 0.2); }
        .mystic-icon { font-size: 4rem; color: var(--green); margin-bottom: 15px; text-shadow: 0 0 20px rgba(0, 168, 107, 0.6); }
        h1 { font-size: 1.6rem; color: var(--green); letter-spacing: 2px; margin-bottom: 20px; }
        p { font-size: 1.2rem; line-height: 1.6; margin-bottom: 15px; word-break: keep-all; }
        .reward { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 4px; margin: 20px 0; border: 1px dashed var(--gold); }
    </style>
</head>
<body>
    <div class="container">
        <div class="mystic-icon">☯</div>
        <h1>혼문 봉인 성공</h1>
        <p>흩어진 기운을 모두 거두었습니다. [cite: 83, 90]</p>
        <p>하회마을의 결계가 다시 굳건해졌습니다. 마을의 안녕을 지켜주어 감사합니다. [cite: 105]</p>
        <div class="reward">
            <p><strong>[ 최종 판정 ]</strong></p>
            <p>획득한 스탬프에 따라 등급패를 수여받고 기념 촬영을 하십시오. [cite: 25, 127]</p>
        </div>
        <p>지역 상품권을 수령하여 마을에서의 여정을 마무리하십시오. [cite: 128]</p>
    </div>
</body>
</html>
