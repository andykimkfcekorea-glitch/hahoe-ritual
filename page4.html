<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세 번째 흔적</title>
    <style>
        :root { --bg: #121212; --text: #EAEAEA; --gold: #D4AF37; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 20px; box-sizing: border-box; }
        .container { border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; padding: 30px 20px; max-width: 400px; width: 100%; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .mystic-icon { font-size: 3rem; color: var(--gold); margin-bottom: 15px; animation: pulse 2s infinite; }
        h1 { font-size: 1.3rem; color: var(--gold); margin-bottom: 20px; }
        .reaction { color: #A8C3BC; font-style: italic; margin-bottom: 25px; }
        .riddle { background: rgba(255,255,255,0.05); padding: 15px; border-left: 3px solid var(--gold); margin: 20px 0; font-weight: bold; }
        .btn { display: inline-block; padding: 12px 24px; background: transparent; color: var(--gold); border: 1px solid var(--gold); border-radius: 4px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="mystic-icon">☰</div>
        <h1>찢어진 봉인문</h1>
        <div class="reaction">"혼자서는 힘이 부족하다. 함께해야 길이 열린다." [cite: 63]</div>
        <div class="riddle">수수께끼: 끊어진 말을 맞추어라. 다른 수습생의 조각과 하나가 될 때 흔적이 보일 것이다. [cite: 60, 109]</div>
        <p>다른 동료와 말을 맞춘 뒤 요원에게 확인받으십시오. [cite: 60, 62]</p>
        <a href="page5.html" class="btn">다음 장소로</a>
    </div>
</body>
</html>
