<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신기 각성</title>
    <style>
        :root { --bg: #121212; --text: #EAEAEA; --gold: #D4AF37; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 20px; box-sizing: border-box; }
        .container { border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; padding: 30px 20px; max-width: 400px; width: 100%; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .mystic-icon { font-size: 3rem; color: var(--gold); margin-bottom: 15px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        h1 { font-size: 1.5rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 20px; }
        p { font-size: 1.1rem; line-height: 1.6; margin-bottom: 15px; word-break: keep-all; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: transparent; color: var(--gold); border: 1px solid var(--gold); border-radius: 4px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="mystic-icon">❂</div>
        <h1>결계가 흔들린다</h1>
        <p>하회마을의 혼문을 지키던 결계가 약해지고 있습니다.</p>
        <p>그대의 기계는 이제 평범한 도구가 아닌 <strong>'신기(神器)'</strong>가 되었습니다.</p>
        <p>마을 곳곳의 흔적을 찾아 혼문을 다시 봉인하십시오.</p>
        <a href="page2.html" class="btn">임무 시작</a>
    </div>
</body>
</html>
